<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recetas | RME Toolkit</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <div id="transition" class="page-transition"></div>

  <header class="topbar" style="--tb-color: var(--accent-recetas)">
    <div class="tb-zone">
      <a href="index.html" class="t-display tb-logo">RMEHub</a>
      <div class="tb-divider"></div>
      <div class="tb-breadcrumb">Recetas de Soldadura</div>
    </div>
    <div class="tb-zone">
      <div class="status-dot"></div>
      <a href="index.html" class="btn-back">← <span class="back-text">Inicio</span></a>
      <div class="avatar">OL</div>
      <button class="mobile-toggle" onclick="toggleDrawer()">☰</button>
    </div>
  </header>

  <div class="layout-main">
    <aside class="col-left" id="drawer">
      <div style="padding: 16px; border-bottom: 1px solid var(--border)">
        <div class="input-group">
          <select id="sel-banda" required onchange="filtrarRecetas()"></select>
          <label class="t-caption">Filtrar por Banda</label>
        </div>
        <div class="input-group">
          <select id="sel-aporte" required onchange="filtrarRecetas()">
            <option value="" selected></option>
            <option value="SI">Con Aporte</option>
            <option value="NO">Sin Aporte</option>
          </select>
          <label class="t-caption">Aporte Térmico</label>
        </div>
        <div class="input-group">
          <input type="text" id="input-apn" placeholder=" " required oninput="filtrarRecetas()">
          <label class="t-caption">Buscar APN / Alias</label>
        </div>
        <button class="btn-action t-micro" onclick="resetCampos()">Limpiar Filtros</button>
      </div>
      <div id="recipeListLeft" style="overflow-y: auto; flex: 1;"></div>
    </aside>

    <main class="col-right" id="recetas-output">
      <div class="state-empty" style="text-align: center; margin: auto; padding: 40px;">
        <div class="t-caption" style="font-size: 16px;">Selecciona una receta de soldadura de la lista izquierda para cargar los datos dinámicos de planta.</div>
      </div>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
