<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBM Predictivo | RME Toolkit</title>
  <link rel="stylesheet" href="estilos.css">
  <style>
    .cbm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .cbm-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.2s ease;
    }
    .cbm-card:hover {
      border-color: #3b82f6;
      background: var(--card2);
    }
    .cbm-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    
    /* ESTILOS INVERTIDOS: Ahora el nuevo código manda */
    .cbm-new {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 900;
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      letter-spacing: 1px;
    }
    .cbm-old {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-disabled);
      background: rgba(255, 255, 255, 0.05);
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px dashed var(--border);
    }
    .cbm-desc {
      font-family: var(--font-heading);
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.4;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="transition" class="page-transition"></div>

  <header class="topbar" style="--tb-color: #3b82f6">
    <div class="tb-zone">
      <a href="index.html" class="t-display tb-logo">RMEHub</a>
      <div class="tb-divider"></div>
      <div class="tb-breadcrumb">Predictivo CBM</div>
    </div>
    <div class="tb-zone">
      <div class="status-dot"></div>
      <a href="index.html" class="btn-back">← <span class="back-text">Inicio</span></a>
      <div class="avatar">OL</div>
      <button class="mobile-toggle" onclick="toggleDrawer()">☰</button>
    </div>
  </header>

  <div class="layout-main">
    <aside class="col-left" id="drawer">
      <div class="t-micro" style="padding: 16px;">Buscador de Nomenclaturas</div>
      <div style="padding: 0 16px; overflow-y: auto; flex: 1;">
        <div class="input-group">
          <input type="text" id="searchInput" placeholder=" " required oninput="filterCBM()">
          <label class="t-caption">Buscar código o descripción...</label>
        </div>
        <div class="alert-box alert-info" style="margin-top: 24px; padding: 12px; border-radius: 6px; background: rgba(59,130,246,0.05); border-left: 3px solid #3b82f6;">
          <strong style="color: #3b82f6; font-size: 11px; display: block; margin-bottom: 4px; font-family: var(--font-mono);">💡 BBDD SINCRONIZADA</strong>
          <span style="font-size: 12px; color: var(--text-muted); line-height: 1.4; display: block;">Busca por código actual de 7 letras, código antiguo (3 letras) o descripción de la pieza.</span>
        </div>
      </div>
    </aside>

    <main class="col-right">
      <div style="max-width: 1000px; width: 100%;">
        <div class="cbm-grid" id="cbmGrid">
          <div class="t-caption" style="grid-column: 1/-1; padding: 40px; text-align: center;">
            Sincronizando nomenclaturas con Google Sheets...
          </div>
        </div>
      </div>
      
      <footer style="margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; max-width: 1000px; width: 100%;">
        <div class="t-micro">Amazon RME · RMU1 · © 2026 Óscar Litón Nevado. Todos los derechos reservados.</div>
      </footer>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
